<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LED 電視牆配置計算器 Pro | 盛源 PERSONA</title>
<style>
/* ─── 核心變數 ─────────────────────────────────────────────── */
:root {
  --bg: #07090e;
  --panel: rgba(18, 22, 33, 0.85);
  --panel-solid: #121621;
  --card: #1c2231;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ff0022;
  --accent-hover: #ff3355;
  --accent-dim: rgba(255, 0, 34, 0.15);
  --text: #f0f2f5;
  --muted: #94a3b8;
  --yellow: #fbbf24;
  --blue: #3b82f6;
  --green: #10b981;
  --glass: blur(12px);
}

/* ─── RESET ─────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { 
  height: 100%; 
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  overflow: hidden;
}

/* ─── HEADER ────────────────────────────────────────────────── */
header {
  background: rgba(7, 9, 14, 0.8);
  backdrop-filter: var(--glass);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 12px; height: 100%; }
.logo-img {
  height: 40px; /* 控制 Logo 高度 */
  width: auto;
  display: block;
  object-fit: contain;
}

/* 備用 Logo 樣式（若圖片加載失敗時顯示） */
.logo-fallback { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 36px; height: 36px; background: var(--accent);
  clip-path: polygon(20% 0%, 100% 0%, 100% 80%, 80% 100%, 0% 100%, 0% 20%);
  display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff;
}
.logo-text-wrap { line-height: 1.2; }
.logo-main { font-size: 16px; font-weight: 800; letter-spacing: 0.5px; }
.logo-main em { color: var(--accent); font-style: normal; }
.logo-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

.header-actions { display: flex; align-items: center; gap: 10px; }
.hdr-btn {
  padding: 8px 16px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 600; border: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  background: rgba(255,255,255,0.05); color: var(--text);
}
.hdr-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
.btn-primary { background: var(--accent); border: none; color: #fff; }
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 4px 12px var(--accent-dim); }

.lang-toggle {
  display: flex; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  border-radius: 8px; padding: 2px;
}
.lang-btn {
  padding: 5px 12px; border: none; background: transparent;
  color: var(--muted); font-size: 11px; font-weight: 700;
  cursor: pointer; border-radius: 6px; transition: all 0.2s;
}
.lang-btn.active { background: #fff; color: #000; }

/* ─── LAYOUT ─────────────────────────────────────────────────── */
.app { display: flex; height: calc(100vh - 64px); }

/* ─── LEFT PANEL ─────────────────────────────────────────────── */
.left-panel {
  width: 340px; flex-shrink: 0;
  background: var(--panel); backdrop-filter: var(--glass);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.left-scroll { flex: 1; overflow-y: auto; padding: 24px; }
.left-scroll::-webkit-scrollbar { width: 4px; }
.left-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.section-group { margin-bottom: 28px; }
.section-title {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Series Tabs */
.series-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px; }
.series-card {
  padding: 10px 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.03);
  border-radius: 10px; cursor: pointer; text-align: center; transition: all 0.2s;
}
.series-card.active { border-color: var(--accent); background: var(--accent-dim); }
.series-card .icon { font-size: 18px; display: block; margin-bottom: 4px; }
.series-card .name { font-size: 11px; font-weight: 600; color: var(--muted); }
.series-card.active .name { color: #fff; }

/* Pitch Grid */
.pitch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.pitch-card {
  background: rgba(0,0,0,0.2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.2s;
}
.pitch-card:hover { border-color: rgba(255,255,255,0.2); }
.pitch-card.active { border-color: var(--accent); background: var(--accent-dim); }
.pitch-val { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 2px; }
.pitch-unit { font-size: 9px; color: var(--muted); text-transform: uppercase; }

/* Input Fields */
.input-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.field-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
.input-box {
  display: flex; align-items: center; background: rgba(0,0,0,0.3);
  border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden;
}
.input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.input-box input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #fff; padding: 12px; font-size: 16px; font-weight: 700; width: 60px;
}
.input-unit { padding: 0 12px; font-size: 11px; font-weight: 700; color: var(--muted); background: rgba(255,255,255,0.03); height: 100%; display: flex; align-items: center; }

.ratio-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.ratio-btn {
  padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.ratio-btn:hover { border-color: var(--muted); color: #fff; }
.ratio-btn.active { background: #fff; color: #000; border-color: #fff; }

.spec-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
.spec-table td { padding: 8px 0; border-bottom: 1px solid var(--border); }
.spec-table td:first-child { color: var(--muted); }
.spec-table td:last-child { text-align: right; font-weight: 700; color: #fff; }

/* ─── RIGHT PANEL ────────────────────────────────────────────── */
.right-panel { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
.canvas-container { flex: 1; position: relative; overflow: hidden; cursor: crosshair; }
#mainCanvas { display: block; width: 100%; height: 100%; }

.floating-tools {
  position: absolute; top: 20px; right: 20px; display: flex; gap: 8px;
}
.tool-btn {
  background: rgba(18, 22, 33, 0.8); backdrop-filter: var(--glass);
  border: 1px solid var(--border); color: #fff; padding: 8px 14px;
  border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: all 0.2s;
}
.tool-btn:hover { background: rgba(30, 40, 60, 0.9); border-color: var(--blue); }

.results-bar {
  background: var(--panel-solid); border-top: 1px solid var(--border);
  padding: 20px 30px; display: grid; grid-template-columns: repeat(7, 1fr);
}
.res-item { text-align: center; border-right: 1px solid var(--border); padding: 0 10px; }
.res-item:last-child { border-right: none; }
.res-val { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 4px; display: block; }
.res-val.highlight { color: var(--accent); }
.res-lbl { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* ─── MODALS ─────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px); z-index: 1000; display: none;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-content {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; width: 100%; max-width: 500px; overflow: hidden;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}
.modal-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; background: rgba(0,0,0,0.2); display: flex; gap: 12px; }

/* ─── MOBILE ─────────────────────────────────────────────────── */
@media (max-width: 1024px) {
  .app { flex-direction: column; overflow-y: auto; height: auto; }
  .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); height: auto; }
  .right-panel { height: 500px; }
  .results-bar { grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .res-item:nth-child(4n) { border-right: none; }
}
@media (max-width: 640px) {
  header { height: auto; padding: 12px; flex-direction: column; gap: 12px; }
  .results-bar { grid-template-columns: repeat(2, 1fr); }
  .res-item:nth-child(2n) { border-right: none; }
  .right-panel { height: 400px; }
}

/* ─── PRINT ──────────────────────────────────────────────────── */
@media print {
  header, .left-panel, .floating-tools, .results-bar { display: none !important; }
  .app, .right-panel { height: auto !important; overflow: visible !important; }
  #mainCanvas { max-width: 100%; page-break-inside: avoid; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <!-- 已將 src 修改為您提到的 logo.png -->
    <img src="logo.png" alt="盛源 PERSONA Logo" class="logo-img" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
    
    <!-- 圖片載入失敗時的備用方案 -->
    <div id="logoFallback" class="logo-fallback" style="display:none;">
      <div class="logo-icon">P</div>
      <div class="logo-text-wrap">
        <div class="logo-main">盛源 <em>PERSONA</em></div>
        <div class="logo-sub">LED Video Wall Pro</div>
      </div>
    </div>
  </div>

  <div class="header-actions">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="changeLang('zh', this)">中</button>
      <button class="lang-btn" onclick="changeLang('en', this)">EN</button>
    </div>
    <button class="hdr-btn" onclick="window.print()">
      <span data-zh="列印 / PDF" data-en="Print / PDF">列印 / PDF</span>
    </button>
    <button class="hdr-btn btn-primary" onclick="openContact()">
      <span data-zh="預約諮詢" data-en="Book Inquiry">預約諮詢</span>
    </button>
  </div>
</header>

<main class="app">
  <!-- 其餘部分保持不變 -->
  <!-- ... (省略中間重複代碼) ... -->
  <aside class="left-panel">
    <div class="left-scroll">
      
      <div class="section-group">
        <div class="section-title" data-zh="產品系列" data-en="Series">產品系列</div>
        <div class="series-grid" id="seriesTabs">
          <div class="series-card active" data-series="indoor_cob" onclick="selectSeries('indoor_cob')">
            <span class="icon">💎</span><span class="name">Indoor COB</span>
          </div>
          <div class="series-card" data-series="indoor_smd" onclick="selectSeries('indoor_smd')">
            <span class="icon">📺</span><span class="name">Indoor SMD</span>
          </div>
          <div class="series-card" data-series="outdoor" onclick="selectSeries('outdoor')">
            <span class="icon">🏙️</span><span class="name">Outdoor</span>
          </div>
        </div>
      </div>

      <div class="section-group">
        <div class="section-title" data-zh="像素間距" data-en="Pixel Pitch">像素間距</div>
        <div class="pitch-grid" id="pitchGrid"></div>
      </div>

      <div class="section-group">
        <div class="section-title" data-zh="螢幕尺寸需求" data-en="Screen Size">螢幕尺寸需求</div>
        <div class="input-pair">
          <div>
            <label class="field-label" data-zh="寬度" data-en="Width">寬度</label>
            <div class="input-box">
              <input type="number" id="inW" value="3.8" step="0.1" min="0.1" oninput="update()">
              <div class="input-unit">m</div>
            </div>
          </div>
          <div>
            <label class="field-label" data-zh="高度" data-en="Height">高度</label>
            <div class="input-box">
              <input type="number" id="inH" value="2.1" step="0.1" min="0.1" oninput="update()">
              <div class="input-unit">m</div>
            </div>
          </div>
        </div>
        <div class="ratio-btns">
          <button class="ratio-btn" onclick="applyRatio(16/9, this)">16:9</button>
          <button class="ratio-btn" onclick="applyRatio(4/3, this)">4:3</button>
          <button class="ratio-btn" onclick="applyRatio(21/9, this)">21:9</button>
          <button class="ratio-btn" onclick="applyRatio(1, this)">1:1</button>
        </div>
      </div>

      <div class="section-group">
        <div class="section-title" data-zh="場域牆面尺寸" data-en="Wall Size">場域牆面尺寸</div>
        <div class="input-pair">
          <div>
            <div class="input-box">
              <input type="number" id="wallW" value="6.0" step="0.5" min="1" oninput="update()">
              <div class="input-unit">W m</div>
            </div>
          </div>
          <div>
            <div class="input-box">
              <input type="number" id="wallH" value="3.5" step="0.5" min="1" oninput="update()">
              <div class="input-unit">H m</div>
            </div>
          </div>
        </div>
      </div>

      <div class="section-group">
        <div class="section-title" data-zh="硬體詳細參數" data-en="Technical Specs">硬體詳細參數</div>
        <table class="spec-table">
          <tr><td data-zh="像素密度" data-en="Density">像素密度</td><td id="sp-density">-</td></tr>
          <tr><td data-zh="最大亮度" data-en="Brightness">最大亮度</td><td id="sp-bright">-</td></tr>
          <tr><td data-zh="更新率" data-en="Refresh Rate">更新率</td><td id="sp-refresh">-</td></tr>
          <tr><td data-zh="平均功耗" data-en="Avg Power">平均功耗</td><td id="sp-pwr">-</td></tr>
        </table>
      </div>

    </div>
  </aside>

  <section class="right-panel">
    <div class="canvas-container" id="cvsWrap">
      <canvas id="mainCanvas"></canvas>
      
      <div class="floating-tools">
        <button class="tool-btn" onclick="document.getElementById('fileIn').click()">
          📷 <span data-zh="上傳背景" data-en="Background">上傳背景</span>
        </button>
        <button class="tool-btn" onclick="resetBg()">
          🔄 <span data-zh="重置" data-en="Reset">重置</span>
        </button>
        <input type="file" id="fileIn" hidden accept="image/*" onchange="loadUserBg(this)">
      </div>
    </div>

    <div class="results-bar">
      <div class="res-item">
        <span class="res-val highlight" id="res-modules">-</span>
        <span class="res-lbl" data-zh="模組配置" data-en="Config">模組配置</span>
      </div>
      <div class="res-item">
        <span class="res-val" id="res-resolution">-</span>
        <span class="res-lbl" data-zh="解析度" data-en="Resolution">解析度</span>
      </div>
      <div class="res-item">
        <span class="res-val highlight" id="res-quality">-</span>
        <span class="res-lbl" data-zh="等級" data-en="Tier">等級</span>
      </div>
      <div class="res-item">
        <span class="res-val" id="res-size">-</span>
        <span class="res-lbl" data-zh="實際尺寸" data-en="Actual Size">實際尺寸</span>
      </div>
      <div class="res-item">
        <span class="res-val" id="res-diag">-</span>
        <span class="res-lbl" data-zh="對角線" data-en="Diagonal">對角線</span>
      </div>
      <div class="res-item">
        <span class="res-val" id="res-power">-</span>
        <span class="res-lbl" data-zh="預估功耗" data-en="Est. Power">預估功耗</span>
      </div>
      <div class="res-item">
        <span class="res-val" id="res-dist">-</span>
        <span class="res-lbl" data-zh="觀賞距離" data-en="View Dist">觀賞距離</span>
      </div>
    </div>
  </section>
</main>

<div class="modal-overlay" id="contactModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 data-zh="✉ 獲取專業配置報價" data-en="✉ Get Quote">✉ 獲取專業配置報價</h3>
      <button style="background:none; border:none; color:#fff; cursor:pointer;" onclick="closeContact()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px; color:var(--muted); margin-bottom:15px;" data-zh="我們將根據您的配置需求提供專屬方案。" data-en="We will provide a custom solution based on your config."></p>
      <input type="text" placeholder="姓名 Name" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:#000; color:#fff; margin-bottom:10px;">
      <input type="tel" placeholder="電話 Phone" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:#000; color:#fff; margin-bottom:10px;">
      <textarea placeholder="其他需求說明..." style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:#000; color:#fff; min-height:80px;"></textarea>
    </div>
    <div class="modal-footer">
      <button class="hdr-btn btn-primary" style="flex:1" onclick="alert('已送出需求！')">確認送出 Send</button>
    </div>
  </div>
</div>

<script>
// ── 產品數據庫 ──
const DB = {
  indoor_cob: {
    modW: 150, modH: 168.75,
    models: [
      { name: 'P0.62', pitch: 0.62, mW: 240, mH: 270, bright: 600, pwr: 470 },
      { name: 'P0.93', pitch: 0.93, mW: 160, mH: 180, bright: 600, pwr: 370 },
      { name: 'P1.25', pitch: 1.25, mW: 120, mH: 135, bright: 600, pwr: 346 },
      { name: 'P1.56', pitch: 1.56, mW: 96,  mH: 108, bright: 600, pwr: 321 }
    ]
  },
  indoor_smd: {
    modW: 320, modH: 160,
    models: [
      { name: 'P1.25', pitch: 1.25, mW: 256, mH: 128, bright: 450, pwr: 510 },
      { name: 'P1.53', pitch: 1.53, mW: 208, mH: 104, bright: 450, pwr: 470 },
      { name: 'P1.86', pitch: 1.86, mW: 172, mH: 86,  bright: 450, pwr: 439 },
      { name: 'P2.5',  pitch: 2.5,  mW: 128, mH: 64,  bright: 450, pwr: 457 }
    ]
  },
  outdoor: {
    modW: 320, modH: 160,
    models: [
      { name: 'P2.5', pitch: 2.5, mW: 128, mH: 64, bright: 4200, pwr: 597 },
      { name: 'P3',   pitch: 3.0, mW: 104, mH: 52, bright: 4200, pwr: 724 },
      { name: 'P4',   pitch: 4.0, mW: 80,  mH: 40, bright: 4200, pwr: 909 }
    ]
  }
};

let state = {
  lang: 'zh',
  series: 'indoor_cob',
  modelIdx: 1,
  bgImg: null,
  isBgLoaded: false,
  personImg: null,
  isPersonLoaded: false
};

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

window.onload = () => {
  init();
  window.onresize = init;
  selectSeries('indoor_cob');
  loadDefaultBg();
  loadPersonImg();
};

function init() {
  const wrap = document.getElementById('cvsWrap');
  if (!wrap) return;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  update();
}

function loadDefaultBg() {
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80";
  img.onload = () => { state.bgImg = img; state.isBgLoaded = true; update(); };
}

function loadPersonImg() {
  const img = new Image();
  img.src = "LED計算人物圖.png";
  img.onload = () => {
    state.personImg = img;
    state.isPersonLoaded = true;
    update();
  };
  img.onerror = () => {
    console.warn("人物圖片載入失敗，將使用備用繪圖模式。");
    state.isPersonLoaded = false;
  };
}

function selectSeries(key) {
  state.series = key;
  state.modelIdx = 0;
  document.querySelectorAll('.series-card').forEach(c => c.classList.toggle('active', c.dataset.series === key));
  const grid = document.getElementById('pitchGrid');
  grid.innerHTML = '';
  DB[key].models.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = `pitch-card ${i === 0 ? 'active' : ''}`;
    card.innerHTML = `<div class="pitch-val">${m.name}</div><div class="pitch-unit">Pitch</div>`;
    card.onclick = () => {
      state.modelIdx = i;
      document.querySelectorAll('.pitch-card').forEach(pc => pc.classList.remove('active'));
      card.classList.add('active');
      update();
    };
    grid.appendChild(card);
  });
  update();
}

function applyRatio(r, btn) {
  const curW = parseFloat(document.getElementById('inW').value) || 3.8;
  document.getElementById('inH').value = Math.max(0.1, (curW / r)).toFixed(2);
  document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  update();
}

function update() {
  const series = DB[state.series];
  const model = series.models[state.modelIdx];
  const reqW = Math.max(0.1, parseFloat(document.getElementById('inW').value) || 1);
  const reqH = Math.max(0.1, parseFloat(document.getElementById('inH').value) || 1);
  const wallW = Math.max(0.5, parseFloat(document.getElementById('wallW').value) || 5);
  const wallH = Math.max(0.5, parseFloat(document.getElementById('wallH').value) || 3);
  const nW = Math.max(1, Math.round((reqW * 1000) / series.modW));
  const nH = Math.max(1, Math.round((reqH * 1000) / series.modH));
  const actW = (nW * series.modW) / 1000;
  const actH = (nH * series.modH) / 1000;
  const resW = nW * model.mW;
  const resH = nH * model.mH;
  document.getElementById('res-modules').innerText = `${nW} × ${nH}`;
  document.getElementById('res-resolution').innerText = `${resW} × ${resH}`;
  document.getElementById('res-size').innerText = `${actW.toFixed(2)} × ${actH.toFixed(2)} m`;
  document.getElementById('res-diag').innerText = (Math.sqrt(actW**2 + actH**2) / 0.0254).toFixed(0) + '"';
  document.getElementById('res-power').innerText = `Max: ${Math.round(actW * actH * model.pwr)}W`;
  document.getElementById('res-dist').innerText = `≥ ${model.pitch}m`;
  let tier = 'SD';
  if (resW >= 3840) tier = '4K UHD';
  else if (resW >= 2560) tier = '2K QHD';
  else if (resW >= 1920) tier = 'Full HD';
  else if (resW >= 1280) tier = 'HD';
  document.getElementById('res-quality').innerText = tier;
  document.getElementById('sp-density').innerText = (1000000 / (model.pitch**2)).toLocaleString(undefined, {maximumFractionDigits:0}) + " dot/m²";
  document.getElementById('sp-bright').innerText = model.bright + " nits";
  document.getElementById('sp-refresh').innerText = "≥ 3840 Hz";
  document.getElementById('sp-pwr').innerText = Math.round(model.pwr / 3) + " W/m²";
  draw(actW, actH, wallW, wallH, nW, nH, resW, resH, model.name);
}

function draw(actW, actH, wallW, wallH, nW, nH, resW, resH, modelName) {
  const W = canvas.width, H = canvas.height;
  if (W <= 0 || H <= 0) return;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0d14';
  ctx.fillRect(0, 0, W, H);
  const margin = 80;
  const availableW = Math.max(1, W - margin * 2);
  const availableH = Math.max(1, H - margin * 2);
  const scale = Math.min(availableW / wallW, availableH / wallH);
  const dw = wallW * scale;
  const dh = wallH * scale;
  const ox = (W - dw) / 2;
  const oy = (H - dh) / 2;
  ctx.fillStyle = '#1a1d26';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 30;
  ctx.fillRect(ox, oy, dw, dh);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const bSize = scale * 0.4;
  if (bSize > 1) {
    for(let x = ox; x < ox+dw; x += bSize) { ctx.beginPath(); ctx.moveTo(x, oy); ctx.lineTo(x, oy+dh); ctx.stroke(); }
    for(let y = oy; y < oy+dh; y += bSize/2) { ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox+dw, y); ctx.stroke(); }
  }
  const sw = actW * scale;
  const sh = actH * scale;
  const sx = ox + (dw - sw) / 2;
  const sy = oy + (dh - sh) / 2;
  const radius = Math.max(1, sw);
  try {
    const grd = ctx.createRadialGradient(sx+sw/2, sy+sh/2, 1, sx+sw/2, sy+sh/2, radius);
    grd.addColorStop(0, 'rgba(59, 130, 246, 0.15)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(sx-50, sy-50, sw+100, sh+100);
  } catch (e) {}
  ctx.save();
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(sx, sy, sw, sh, Math.min(4, sw/2, sh/2));
  else ctx.rect(sx, sy, sw, sh);
  ctx.clip();
  if (state.isBgLoaded && state.bgImg) {
    ctx.drawImage(state.bgImg, sx, sy, sw, sh);
    ctx.fillStyle = 'rgba(0,0,10,0.3)';
    ctx.fillRect(sx, sy, sw, sh);
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(sx, sy, sw, sh);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 0.5;
  if (sw > 0 && nW > 0) { for(let i=1; i<nW; i++) { let lx = sx + (sw/nW)*i; ctx.beginPath(); ctx.moveTo(lx, sy); ctx.lineTo(lx, sy+sh); ctx.stroke(); } }
  if (sh > 0 && nH > 0) { for(let j=1; j<nH; j++) { let ly = sy + (sh/nH)*j; ctx.beginPath(); ctx.moveTo(sx, ly); ctx.lineTo(sx+sw, ly); ctx.stroke(); } }
  ctx.restore();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx, sy, sw, sh);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Inter';
  ctx.textAlign = 'center';
  ctx.fillText(`${actW.toFixed(2)}m`, sx + sw/2, sy + sh + 20);
  ctx.save();
  ctx.translate(sx - 15, sy + sh/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText(`${actH.toFixed(2)}m`, 0, 0);
  ctx.restore();
  if (sw > 120 && sh > 30) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    const labelW = 120, labelH = 30;
    const lx = sx + sw/2 - labelW/2, ly = sy + sh/2 - labelH/2;
    if (ctx.roundRect) ctx.roundRect(lx, ly, labelW, labelH, 15);
    else ctx.rect(lx, ly, labelW, labelH);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Inter';
    ctx.fillText(`${resW} × ${resH} px`, sx + sw/2, sy + sh/2 + 5);
  }
  drawHuman(sx - 80, oy + dh, 1.75 * scale);
}

function drawHuman(x, y, h) {
  if (h <= 0) return;
  if (state.isPersonLoaded && state.personImg) {
    const img = state.personImg;
    const aspect = img.width / img.height;
    const drawW = h * aspect;
    const drawH = h;
    ctx.drawImage(img, x - drawW / 2, y - drawH, drawW, drawH);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(x, y - h + h*0.1, Math.max(1, h*0.08), 0, Math.PI*2); ctx.fill();
    if (ctx.roundRect) { ctx.roundRect(x - h*0.1, y - h*0.82, h*0.2, h*0.4, Math.max(1, h*0.05)); ctx.fill(); }
    else { ctx.fillRect(x - h*0.1, y - h*0.82, h*0.2, h*0.4); }
    ctx.fillRect(x - h*0.09, y - h*0.45, h*0.07, h*0.45);
    ctx.fillRect(x + h*0.02, y - h*0.45, h*0.07, h*0.45);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '10px Inter';
  ctx.textAlign = 'center';
  ctx.fillText("175cm", x, y + 15);
}

function changeLang(l, btn) {
  state.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('[data-zh]').forEach(el => el.innerText = el.dataset[l]);
  update();
}

function loadUserBg(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => { state.bgImg = img; state.isBgLoaded = true; update(); };
      img.src = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function resetBg() { loadDefaultBg(); }
function openContact() { document.getElementById('contactModal').classList.add('open'); }
function closeContact() { document.getElementById('contactModal').classList.remove('open'); }
