<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LED 電視牆配置計算器 Pro | 盛源 PERSONA</title>
<style>
/* ─── 核心變數 ─────────────────────────────────────────────── */
:root {
  --bg: #0b0d12;
  --panel: #12151f;
  --card: #181c28;
  --border: #242a3a;
  --accent: #e3001b;
  --accent-dim: rgba(227, 0, 27, 0.15);
  --text: #e8ecf4;
  --muted: #8a96b0;
  --yellow: #f5c842;
  --blue: #4a9eff;
  --green: #34d399;
  --line-green: #06c755;
}

/* ─── RESET ─────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  height: 100%; width: 100%;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
  background: var(--bg); color: var(--text); 
  overflow-x: hidden;
}

/* ─── HEADER ────────────────────────────────────────────────── */
header {
  background: linear-gradient(90deg, #0f0008 0%, #0b0d12 50%, #000a18 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; position: relative; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-img { height: 32px; width: auto; }
.logo-text div:first-child { font-size: 14px; font-weight: 800; letter-spacing: 0.5px; }
.logo-text div:last-child { font-size: 9px; color: var(--muted); }

.header-actions { display: flex; align-items: center; gap: 8px; }
.hdr-btn {
  padding: 7px 12px; border-radius: 8px; cursor: pointer;
  font-size: 12px; font-weight: 600; border: none;
  display: flex; align-items: center; gap: 4px; transition: 0.2s;
  white-space: nowrap; color: #fff;
}
.btn-line { background: var(--line-green); }
.btn-pdf { background: #1c2231; border: 1px solid var(--border); }
.btn-contact { background: var(--accent); }

.lang-toggle { display: flex; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.lang-btn { padding: 4px 10px; border: none; background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; }
.lang-btn.active { background: var(--accent); color: #fff; }

/* ─── LAYOUT ─────────────────────────────────────────────────── */
.app { display: flex; height: calc(100vh - 60px); width: 100%; transition: flex-direction 0.3s ease; }

/* ─── LEFT PANEL ─────────────────────────────────────────────── */
.left-panel {
  width: 320px; flex-shrink: 0;
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.left-scroll { flex: 1; overflow-y: auto; padding: 20px; }
.left-scroll::-webkit-scrollbar { width: 4px; }
.left-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.section-title { font-size: 11px; font-weight: 700; color: #a0adc4; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; margin-top: 5px; }
.series-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 20px; background: rgba(0,0,0,0.25); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
.series-btn { padding: 10px 2px; border: none; background: transparent; color: #8a96b0; border-radius: 7px; cursor: pointer; font-size: 10px; font-weight: 600; text-align: center; }
.series-btn.active { background: var(--accent); color: #fff; }
.series-btn .dot { display: block; width: 12px; height: 12px; border-radius: 50%; margin: 0 auto 5px; }

.pitch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.pitch-card { border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 4px; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); }
.pitch-card.active { border-color: var(--accent); background: var(--accent-dim); }
.pitch-name { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 2px; }
.pitch-meta { font-size: 8px; color: var(--muted); }

.field-group { margin-bottom: 14px; }
.field-label { font-size: 11px; color: #a0adc4; font-weight: 600; margin-bottom: 5px; display: block; }
.field-input { display: flex; align-items: center; background: rgba(0,0,0,0.3); border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
.field-input input { flex: 1; background: transparent; border: none; outline: none; color: #fff; padding: 10px; font-size: 18px; font-weight: 700; width: 100%; }
.field-unit { padding: 0 10px; font-size: 12px; color: var(--muted); border-left: 1px solid var(--border); }

.ratio-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 18px; }
.ratio-btn { padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: #8a96b0; font-size: 11px; cursor: pointer; }
.ratio-btn.active { border-color: var(--accent); color: #fff; }

.toggle-row { display: flex; gap: 8px; margin-bottom: 20px; }
.toggle-btn { flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; background: transparent; color: #8a96b0; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
.toggle-btn.active-yellow { border-color: var(--yellow); color: var(--yellow); background: rgba(245,200,66,0.1); }
.toggle-btn.active-green { border-color: var(--green); color: var(--green); background: rgba(16, 185, 129, 0.1); }

.spec-mini { width: 100%; border-collapse: collapse; font-size: 11.5px; margin-bottom: 15px; }
.spec-mini td { padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.spec-mini td:last-child { text-align: right; font-weight: 700; color: #fff; }

.info-box { background: rgba(74,158,255,0.08); border: 1px solid rgba(74,158,255,0.2); border-radius: 10px; padding: 12px; font-size: 11px; color: #a8ccf5; line-height: 1.6; }

/* ─── RIGHT PANEL ────────────────────────────────────────────── */
.right-panel { flex: 1; display: flex; flex-direction: column; background: #080a0f; position: relative; overflow: hidden; }
.canvas-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
#mainCanvas { max-width: 100%; max-height: 100%; cursor: grab; }

.upload-btn-wrap { position: absolute; top: 15px; right: 15px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
.upload-btn { padding: 8px 16px; border-radius: 10px; background: rgba(20,24,36,0.85); border: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 11px; cursor: pointer; backdrop-filter: blur(8px); }

.results-bar { 
  background: var(--panel); border-top: 1px solid var(--border); padding: 15px 20px; 
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; flex-shrink: 0;
}
.res-item { text-align: center; border-right: 1px solid var(--border); padding: 0 5px; }
.res-item:last-child { border-right: none; }
.res-val { font-size: 17px; font-weight: 900; color: #fff; margin-bottom: 4px; display: block; }
.res-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: 700; }

/* ─── MOBILE RWD (桌機比例保護，手機方向適配) ───────────────── */
@media (max-width: 1024px) {
  body { overflow-y: auto; }
  .app { flex-direction: column; height: auto; }
  .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); height: auto; }
  .left-scroll { overflow-y: visible; }
  .right-panel { height: 60vh; min-height: 450px; }
  .results-bar { grid-template-columns: repeat(4, 1fr); gap: 15px 0; }
  .res-item:nth-child(4n) { border-right: none; }
  header { height: auto; padding: 12px; flex-wrap: wrap; gap: 10px; }
  .header-actions { width: 100%; justify-content: space-between; }
}

@media (max-width: 1024px) and (orientation: landscape) {
  .app { flex-direction: row; height: calc(100vh - 60px); }
  .left-panel { width: 300px; height: 100%; border-bottom: none; border-right: 1px solid var(--border); }
  .right-panel { height: 100%; }
  .results-bar { grid-template-columns: repeat(7, 1fr); padding: 10px; }
}

@media (max-width: 480px) {
  .results-bar { grid-template-columns: repeat(2, 1fr); }
  .res-item { border-right: none; }
  .res-item:nth-child(odd) { border-right: 1px solid var(--border); }
  .pitch-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ─── PRINT SHEET ──────────────────────────────────────────── */
.print-sheet { display: none; }
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  header, .app, .modal-overlay { display: none !important; }
  .print-sheet { display: block !important; padding: 40px; color: #111; font-family: sans-serif; }
  .ps-header { border-bottom: 3px solid #e3001b; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; }
  .ps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ps-row { display: flex; justify-content: space-between; background: #f7f7f7; padding: 8px 12px; border-radius: 6px; }
}

/* ─── MODAL ─────────────────────────────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-content { background: #1c2231; border: 1px solid var(--border); border-radius: 16px; width: 450px; max-width: 95vw; padding: 25px; }
.form-input { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px; color: #fff; padding: 12px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="PERSONA" class="logo-img" onerror="this.style.display='none';">
    <div class="logo-text">
      <div>盛源 <em>PERSONA</em></div>
      <div data-zh="LED 電視牆 · 專業顯示方案" data-en="LED Video Wall Pro">LED 電視牆 · 專業顯示方案</div>
    </div>
  </div>

  <div class="header-actions">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="changeLang('zh', this)">中</button>
      <button class="lang-btn" onclick="changeLang('en', this)">EN</button>
    </div>
    <button class="hdr-btn btn-line" onclick="window.open('https://line.me/R/ti/p/@touchpersona', '_blank')"><span>LINE 洽詢</span></button>
    <button class="hdr-btn btn-pdf" onclick="exportPDF()"><span>匯出規格</span></button>
    <button class="hdr-btn btn-contact" onclick="openContact()"><span>聯繫我們</span></button>
  </div>
</header>

<main class="app">
  <aside class="left-panel">
    <div class="left-scroll">
      <div class="section-title" data-zh="產品系列" data-en="Product Series">產品系列</div>
      <div class="series-tabs">
        <button class="series-btn active" data-series="indoor_cob" onclick="selectSeries('indoor_cob', this)"><span class="dot" style="background:#007aff"></span>室內 COB</button>
        <button class="series-btn" data-series="indoor_smd" onclick="selectSeries('indoor_smd', this)"><span class="dot" style="background:#32d74b"></span>室內 SMD</button>
        <button class="series-btn" data-series="outdoor_smd" onclick="selectSeries('outdoor_smd', this)"><span class="dot" style="background:#ffd60a"></span>戶外 SMD</button>
      </div>

      <div class="section-title" data-zh="像素間距" data-en="Pixel Pitch">像素間距</div>
      <div id="pitchGrid" class="pitch-grid"></div>

      <div class="section-title" data-zh="螢幕需求尺寸" data-en="Screen Size">螢幕需求尺寸</div>
      <div class="field-group">
        <div class="field-input"><input type="number" id="inW" value="3.8" step="0.1" oninput="update()"><div class="field-unit">W m</div></div>
      </div>
      <div class="field-group">
        <div class="field-input"><input type="number" id="inH" value="2.1" step="0.1" oninput="update()"><div class="field-unit">H m</div></div>
      </div>
      <div class="ratio-row">
        <button class="ratio-btn" onclick="applyRatio(16/9, this)">16:9</button>
        <button class="ratio-btn" onclick="applyRatio(4/3, this)">4:3</button>
        <button class="ratio-btn" onclick="applyRatio(21/9, this)">21:9</button>
        <button class="ratio-btn" onclick="applyRatio(1, this)">1:1</button>
      </div>

      <div class="section-title" data-zh="📐 牆壁尺寸" data-en="📐 Wall Size">📐 牆壁尺寸</div>
      <div class="field-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
        <div class="field-input"><input type="number" id="wallW" value="6.0" oninput="update()"><div class="field-unit">W</div></div>
        <div class="field-input"><input type="number" id="wallH" value="3.5" oninput="update()"><div class="field-unit">H</div></div>
      </div>

      <div class="section-title" data-zh="報價體系 (未稅)" data-en="Pricing System">報價體系 (未稅)</div>
      <div class="toggle-row">
        <button class="toggle-btn active-green" id="price-dealer" onclick="setPriceType('dealer', this)">經銷價</button>
        <button class="toggle-btn" id="price-direct" onclick="setPriceType('direct', this)">直銷價</button>
      </div>

      <div class="section-title" data-zh="目前規格" data-en="Specs">目前規格</div>
      <table class="spec-mini">
        <tr><td data-zh="系列" data-en="Series">系列</td><td id="sp-series">-</td></tr>
        <tr><td data-zh="模組尺寸" data-en="Module">模組尺寸</td><td id="sp-modSize">-</td></tr>
        <tr><td data-zh="最大電流" data-en="Current">最大電流</td><td id="sp-amp">-</td></tr>
        <tr style="background:rgba(16,185,129,0.1)"><td data-zh="預估單價" data-en="Unit Price">預估單價</td><td id="sp-unitPrice" style="color:var(--green)">-</td></tr>
      </table>
      <div class="info-box" id="infoBox"></div>
    </div>
  </aside>

  <section class="right-panel">
    <div class="canvas-wrap" id="cvsWrap">
      <canvas id="mainCanvas"></canvas>
      <div class="upload-btn-wrap">
        <button class="upload-btn" onclick="document.getElementById('fileInBg').click()">🏠 上傳背景</button>
        <input type="file" id="fileInBg" hidden accept="image/*" onchange="loadPhoto(this, 'bg')">
        <button class="upload-btn" style="border-color:var(--accent)" onclick="document.getElementById('fileInScreen').click()">📺 上傳內容</button>
        <input type="file" id="fileInScreen" hidden accept="image/*" onchange="loadPhoto(this, 'screen')">
      </div>
    </div>

    <div class="results-bar">
      <div class="res-item"><span class="res-val" id="res-modules">-</span><span class="res-lbl">模組配置</span></div>
      <div class="res-item"><span class="res-val" id="res-total">-</span><span class="res-lbl">總片數</span></div>
      <div class="res-item"><span class="res-val" id="res-resolution">-</span><span class="res-lbl">解析度</span></div>
      <div class="res-item"><span class="res-val" id="res-size" style="color:var(--blue)">-</span><span class="res-lbl">實際尺寸</span></div>
      <div class="res-item"><span class="res-val" id="res-diag" style="color:var(--yellow)">-</span><span class="res-lbl">對角線</span></div>
      <div class="res-item"><span class="res-val" id="res-estPrice" style="color:var(--green)">-</span><span class="res-lbl">初步總價</span></div>
      <div class="res-item"><span class="res-val" id="res-dist">-</span><span class="res-lbl">觀賞距離</span></div>
    </div>
  </section>
</main>

<script>
const DB = {
  indoor_cob: {
    name: { zh: '室內 COB 系列', en: 'Indoor COB' }, modW: 320, modH: 160, angle: '160°/160°', refresh: '3840 Hz',
    info: { zh: '💡 COB 技術：表面平整，防塵防潮，適合近距離觀看。', en: '💡 COB Tech: Smooth surface, moisture proof, ideal for close view.' },
    models: [{ name: 'P0.93', pitch: 0.93, mW: 344, mH: 172, max: 370 }, { name: 'P1.25', pitch: 1.25, mW: 256, mH: 128, max: 346 }, { name: 'P1.53(C)', pitch: 1.53, mW: 208, mH: 104, max: 321, price: { dealer: [2500, 2800], direct: [3500, 3800] } }]
  },
  indoor_smd: {
    name: { zh: '室內 SMD/GOB 系列', en: 'Indoor SMD/GOB' }, modW: 320, modH: 160, angle: '140°/130°', refresh: '3840 Hz',
    info: { zh: '💡 SMD 技術：色彩鮮豔。GOB 增加保護膠體。', en: '💡 SMD Tech: Vivid colors. GOB adds resin protection.' },
    models: [{ name: 'P1.86(S)', pitch: 1.86, mW: 172, mH: 86, max: 439, price: { dealer: [1500, 1600], direct: [2000, 2100] } }, { name: 'P1.86(G)', pitch: 1.86, mW: 172, mH: 86, max: 439, price: { dealer: [1800, 1900], direct: [2400, 2600] } }, { name: 'P2.5', pitch: 2.5, mW: 128, mH: 64, max: 457 }]
  },
  outdoor_smd: {
    name: { zh: '戶外 SMD 系列', en: 'Outdoor SMD' }, modW: 320, modH: 160, angle: '140°/130°', refresh: '3840 Hz',
    info: { zh: '💡 戶外型：高亮度，強烈陽光下清晰顯示。', en: '💡 Outdoor: High brightness, clear under sunlight.' },
    models: [{ name: 'P3', pitch: 3.0, mW: 104, mH: 52, max: 724 }]
  }
};

let state = { lang: 'zh', series: 'indoor_cob', modelIdx: 0, priceType: 'dealer', bgImg: null, screenImg: null, personImg: null };
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

const SCREEN_DEF_URL = "https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?q=80&w=1280&auto=format&fit=crop";
const screenDef = new Image(); screenDef.crossOrigin = "anonymous"; screenDef.src = SCREEN_DEF_URL;
screenDef.onload = () => { if(!state.screenImg) update(); };

window.onload = () => {
  init(); window.onresize = init;
  selectSeries('indoor_cob', document.querySelector('.series-btn'));
  const pImg = new Image(); pImg.src = "LED計算人物圖.png"; pImg.onload = () => { state.personImg = pImg; update(); };
};

function init() {
  const wrap = document.getElementById('cvsWrap');
  if(!wrap) return;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  update();
}

function selectSeries(key, btn) {
  state.series = key; state.modelIdx = 0;
  document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const grid = document.getElementById('pitchGrid'); grid.innerHTML = '';
  DB[key].models.forEach((m, i) => {
    const card = document.createElement('div'); card.className = `pitch-card ${i===0?'active':''}`;
    card.innerHTML = `<div class="pitch-name">${m.name}</div><div class="pitch-meta">${m.pitch}mm</div>`;
    card.onclick = () => { document.querySelectorAll('.pitch-card').forEach(c => c.classList.remove('active')); card.classList.add('active'); state.modelIdx = i; update(); };
    grid.appendChild(card);
  });
  update();
}

function setPriceType(type, btn) {
  state.priceType = type;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active-green'));
  btn.classList.add('active-green'); update();
}

function update() {
  const s = DB[state.series], m = s.models[state.modelIdx];
  const reqW = parseFloat(document.getElementById('inW').value) || 3, reqH = parseFloat(document.getElementById('inH').value) || 2;
  const nW = Math.max(1, Math.round(reqW * 1000 / s.modW)), nH = Math.max(1, Math.round(reqH * 1000 / s.modH));
  const actW = nW * s.modW / 1000, actH = nH * s.modH / 1000;
  const resW = nW * m.mW, resH = nH * m.mH;
  const totalMods = nW * nH;

  let priceStr = "詢價", unitPrice = "-";
  if(m.price) {
    const r = m.price[state.priceType];
    priceStr = `${(totalMods*r[0]/10000).toFixed(1)}~${(totalMods*r[1]/10000).toFixed(1)}萬`;
    unitPrice = `${r[0]}~${r[1]}元`;
  }

  document.getElementById('res-modules').innerText = `${nW}×${nH}`;
  document.getElementById('res-total').innerText = `${totalMods}片`;
  document.getElementById('res-resolution').innerText = `${resW.toLocaleString()}×${resH.toLocaleString()}`;
  document.getElementById('res-size').innerText = `${actW.toFixed(2)}×${actH.toFixed(2)}m`;
  document.getElementById('res-diag').innerText = (Math.sqrt(actW**2 + actH**2)/0.0254).toFixed(0) + '"';
  document.getElementById('res-estPrice').innerText = priceStr;
  document.getElementById('res-dist').innerText = `≥ ${m.pitch}m`;
  document.getElementById('sp-series').innerText = s.name[state.lang];
  document.getElementById('sp-modSize').innerText = `${s.modW}×${s.modH}mm`;
  document.getElementById('sp-unitPrice').innerText = unitPrice;
  document.getElementById('infoBox').innerText = s.info[state.lang];

  draw(actW, actH, parseFloat(document.getElementById('wallW').value)||6, parseFloat(document.getElementById('wallH').value)||3.5, nW, nH);
}

function draw(actW, actH, wallW, wallH, nW, nH) {
  const W = canvas.width, H = canvas.height; ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0a0d14'; ctx.fillRect(0,0,W,H);
  const margin = (W < 600) ? 60 : 100;
  const scale = Math.min((W - margin*2)/wallW, (H - margin*2)/wallH);
  const dw = wallW * scale, dh = wallH * scale, ox = (W-dw)/2, oy = (H-dh)/2;

  ctx.fillStyle = '#1a1d26'; ctx.fillRect(ox, oy, dw, dh);
  if (state.bgImg) ctx.drawImage(state.bgImg, ox, oy, dw, dh);

  const sw = actW * scale, sh = actH * scale, sx = ox+(dw-sw)/2, sy = oy+(dh-sh)/2;
  ctx.save(); ctx.beginPath(); ctx.rect(sx, sy, sw, sh); ctx.clip();
  const activeImg = state.screenImg || screenDef;
  if (activeImg.complete) {
    const iAR = activeImg.width / activeImg.height, sAR = sw/sh;
    let iw, ih; if(iAR > sAR){ih=sh; iw=ih*iAR;} else {iw=sw; ih=iw/iAR;}
    ctx.drawImage(activeImg, sx+(sw-iw)/2, sy+(sh-ih)/2, iw, ih);
  }
  if (!state.screenImg) {
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 0.5;
    for(let i=1;i<nW;i++){ctx.moveTo(sx+i*sw/nW,sy);ctx.lineTo(sx+i*sw/nW,sy+sh);}
    for(let j=1;j<nH;j++){ctx.moveTo(sx,sy+j*sh/nH);ctx.lineTo(sx+sw,sy+j*sh/nH);}
    ctx.stroke();
  }
  ctx.restore();

  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.strokeRect(sx, sy, sw, sh);
  if (state.personImg) { const ph = 1.78 * scale, pw = ph * (state.personImg.width/state.personImg.height); ctx.drawImage(state.personImg, sx-80-pw/2, oy+dh-ph, pw, ph); }
}

function changeLang(l, btn) { state.lang = l; document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); update(); }
function applyRatio(r, btn) { document.getElementById('inH').value = (parseFloat(document.getElementById('inW').value) / r).toFixed(2); document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); update(); }
function loadPhoto(input, type) { if (input.files && input.files[0]) { const r = new FileReader(); r.onload = (e) => { const img = new Image(); img.onload = () => { if (type === 'bg') state.bgImg = img; else state.screenImg = img; update(); }; img.src = e.target.result; }; r.readAsDataURL(input.files[0]); } }
function exportPDF() { window.print(); }
function openContact() { alert('諮詢功能已記錄。'); }
</script>
